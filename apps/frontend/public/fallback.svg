<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Soft modern background gradient -->
  <rect width="64" height="64" rx="16" fill="url(#bg-grad)"/>
  <rect width="63" height="63" x="0.5" y="0.5" rx="15.5" stroke="url(#border-grad)" stroke-width="1"/>
  
  <!-- Subtle pattern dots or tech grid -->
  <path d="M12 20h40M12 28h40M12 36h40M12 44h40" stroke="#E2E8F0" stroke-width="0.5" opacity="0.3"/>
  <path d="M20 12v32M28 12v32M36 12v32M44 12v32" stroke="#E2E8F0" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Glowing circle in the center -->
  <circle cx="32" cy="32" r="18" fill="url(#glow-grad)" opacity="0.6"/>
  
  <!-- Stylized Cloud icon with a gradient and elegant shape -->
  <g filter="url(#shadow)">
    <!-- Base Cloud Path -->
    <path d="M23.5 39C20.4624 39 18 36.5376 18 33.5C18 30.6865 20.108 28.3653 22.8682 28.0416C23.6334 23.4907 27.5796 20 32.3333 20C36.4385 20 39.9575 22.6105 41.2464 26.2415C42.0628 25.4496 43.1751 25 44.4 25C46.9405 25 49 27.0595 49 29.6C49 29.897 48.9715 30.1873 48.9171 30.4687C51.2721 31.4285 53 33.7259 53 36.4C53 40.0452 50.0452 43 46.4 43H23.5" 
          fill="url(#cloud-fill)" 
          stroke="url(#cloud-stroke)" 
          stroke-width="1.5" 
          stroke-linejoin="round"/>
          
    <!-- Decorative gear or node representing cloud technology/services in the center of the cloud -->
    <path d="M30 33a2 2 0 1 0 4 0 2 2 0 0 0-4 0m2-4v1m0 6v1m-4-4h1m6 0h1" stroke="#FF9900" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <defs>
    <!-- Background: subtle slate gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCFDFE"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    
    <!-- Border: elegant light-slate/gold blend -->
    <linearGradient id="border-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="50%" stop-color="#FF9900" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    
    <!-- Cloud Fill: semi-transparent white/blue glow -->
    <linearGradient id="cloud-fill" x1="18" y1="20" x2="49" y2="43" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    
    <!-- Cloud Stroke: gradient from AWS Orange to warm amber -->
    <linearGradient id="cloud-stroke" x1="18" y1="20" x2="49" y2="43" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF9900"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    
    <!-- Soft glow behind the cloud -->
    <radialGradient id="glow-grad" cx="32" cy="32" r="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF9900" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF9900" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Subtle drop shadow for depth -->
    <filter id="shadow" x="14" y="18" width="43" height="31" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#475569" flood-opacity="0.08"/>
    </filter>
  </defs>
</svg>
